<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Working</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  padding:30px;
  text-align:center;
}
button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
  cursor:pointer;
}
#log{
  background:#000;
  color:#00ff00;
  padding:10px;
  height:200px;
  overflow:auto;
  font-family:monospace;
  margin-top:20px;
}
</style>
</head>
<body>

<h2>🔥 Firebase جاهز</h2>

<button onclick="saveData()">حفظ بيانات</button>
<button onclick="loadData()">جلب بيانات</button>

<div id="log"></div>

<script>
const FB_URL = "https://omar-ali-97d74-default-rtdb.firebaseio.com";

// ===== أدوات =====
function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

function cleanPath(path){
  return path.replace(/[.#$\[\]]/g, "*");
}

// ===== حفظ =====
async function fbSet(path,data){
  try{
    const url = FB_URL + "/" + cleanPath(path) + ".json";
    log("📤 جاري الحفظ...");

    const res = await fetch(url,{
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();
    if(json && json.error) throw new Error(json.error);

    localStorage.setItem(
      "backup_" + cleanPath(path).replace(/\//g,"_"),
      JSON.stringify(data)
    );

    log("✅ تم الحفظ بنجاح");
    return true;

  }catch(e){
    log("❌ فشل الحفظ: " + e.message);
    return false;
  }
}

// ===== جلب =====
async function fbGet(path){
  try{
    const url = FB_URL + "/" + cleanPath(path) + ".json";
    log("📥 جاري الجلب...");

    const res = await fetch(url);
    const json = await res.json();

    if(json !== null){
      localStorage.setItem(
        "backup_" + cleanPath(path).replace(/\//g,"_"),
        JSON.stringify(json)
      );
    }

    log("✅ تم الجلب بنجاح");
    return json;

  }catch(e){
    log("⚠️ فشل الجلب — استخدام النسخة المحلية");

    const local = localStorage.getItem(
      "backup_" + cleanPath(path).replace(/\//g,"_")
    );

    return local ? JSON.parse(local) : null;
  }
}

// ===== أزرار =====
async function saveData(){
  await fbSet("test/data",{
    name:"Omar",
    time:Date.now()
  });
}

async function loadData(){
  const data = await fbGet("test/data");
  log("📦 النتيجة: " + JSON.stringify(data));
}
</script>

</body>
</html>
